spring:
  application:
    name: ai-interview-agent

  # Default profile uses H2 for easy local development
  datasource:
    url: jdbc:h2:mem:interviewdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

# Actuator - expose health endpoint for Railway health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# Claude API Configuration
claude:
  api:
    key: ${CLAUDE_API_KEY:your-api-key-here}
    base-url: https://api.anthropic.com/v1
    model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:my-super-secret-key-change-in-production-please}
  expiration-ms: 86400000  # 24 hours

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:interviewdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update
